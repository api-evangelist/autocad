aid: autocad
name: AutoCAD
description: >-
  APIs for Autodesk AutoCAD, providing programmatic access to CAD design, drawing,
  and automation capabilities through Autodesk Platform Services (APS, formerly Forge)
  and desktop development environments including AutoLISP, ObjectARX, .NET, and JavaScript.
